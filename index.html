<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Promotion</title>
  <meta name="description" content="You're invited! Check out our upcoming event.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Event Promotion">
  <meta property="og:description" content="You're invited to our upcoming event!">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --accent: #f59e0b;
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --border: #334155;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Hero Section */
    .hero {
      position: relative;
      width: 100%;
      min-height: 60vh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
      background: linear-gradient(135deg, var(--primary-dark), var(--bg));
    }

    .hero-image {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.4;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, var(--bg) 0%, transparent 60%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      padding: 40px 24px 48px;
      margin: 0 auto;
      width: 100%;
    }

    .event-date-badge {
      display: inline-block;
      background: var(--accent);
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 16px;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
    }

    .hero .subtitle {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Main Content */
    .main {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* Info Cards Row */
    .info-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .info-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: background 0.2s;
    }

    .info-card:hover {
      background: var(--bg-card-hover);
    }

    .info-card .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .info-card .value {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .info-card .icon {
      font-size: 1.3rem;
      margin-bottom: 8px;
    }

    /* Description Section */
    .section-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .description {
      color: var(--text-muted);
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Highlights */
    .highlights {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .highlight-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .highlight-check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.85rem;
    }

    .highlight-text {
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* Gallery */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 16px;
      margin-bottom: 40px;
    }

    .gallery img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    /* RSVP Button */
    .rsvp-section {
      text-align: center;
      padding: 40px 0;
    }

    .rsvp-btn {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      font-family: inherit;
      font-size: 1.1rem;
      font-weight: 700;
      padding: 16px 48px;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }

    .rsvp-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-1px);
    }

    /* Contact */
    .contact {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      padding-bottom: 40px;
    }

    .contact a {
      color: var(--primary);
      text-decoration: none;
    }

    /* Loading State */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      font-size: 1.1rem;
      color: var(--text-muted);
    }

    /* Hidden until loaded */
    .page-content { display: none; }
    .page-content.loaded { display: block; }
  </style>
</head>
<body>

  <div class="loading" id="loading">Loading event details...</div>

  <div class="page-content" id="page">
    <!-- Hero -->
    <section class="hero" id="hero-section">
      <img class="hero-image" id="hero-img" src="" alt="Event hero image">
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <div class="event-date-badge" id="hero-date"></div>
        <h1 id="hero-title"></h1>
        <p class="subtitle" id="hero-subtitle"></p>
      </div>
    </section>

    <!-- Main Content -->
    <div class="main">
      <!-- Info Cards -->
      <div class="info-row">
        <div class="info-card">
          <div class="icon">&#128197;</div>
          <div class="label">Date</div>
          <div class="value" id="info-date"></div>
        </div>
        <div class="info-card">
          <div class="icon">&#128336;</div>
          <div class="label">Time</div>
          <div class="value" id="info-time"></div>
        </div>
        <div class="info-card">
          <div class="icon">&#128205;</div>
          <div class="label">Location</div>
          <div class="value" id="info-location"></div>
        </div>
      </div>

      <!-- Description -->
      <h2 class="section-title">About This Event</h2>
      <p class="description" id="event-description"></p>

      <!-- Highlights -->
      <h2 class="section-title" id="highlights-title" style="display:none;">What to Expect</h2>
      <div class="highlights" id="highlights-container"></div>

      <!-- Gallery (additional images beyond the hero) -->
      <div class="gallery" id="gallery"></div>

      <!-- RSVP -->
      <div class="rsvp-section" id="rsvp-section" style="display:none;">
        <a class="rsvp-btn" id="rsvp-btn" href="#">RSVP Now</a>
      </div>

      <!-- Contact -->
      <div class="contact" id="contact-section" style="display:none;"></div>
    </div>
  </div>

  <script>
    async function loadEvent() {
      try {
        const res = await fetch('event.json?' + Date.now());
        const ev = await res.json();

        // Update meta tags
        document.title = ev.title || 'Event';
        document.querySelector('meta[property="og:title"]').content = ev.title || '';
        document.querySelector('meta[property="og:description"]').content = ev.description || '';

        // Hero
        document.getElementById('hero-title').textContent = ev.title || '';
        document.getElementById('hero-subtitle').textContent = ev.subtitle || '';
        document.getElementById('hero-date').textContent = ev.date || '';

        // Hero image
        if (ev.images && ev.images.length > 0) {
          document.getElementById('hero-img').src = ev.images[0];
          document.getElementById('hero-img').alt = ev.title;
        } else {
          document.getElementById('hero-img').style.display = 'none';
        }

        // Info cards
        document.getElementById('info-date').textContent = ev.date || 'TBA';
        document.getElementById('info-time').textContent = ev.time || 'TBA';
        document.getElementById('info-location').textContent = ev.location || 'TBA';

        // Description
        document.getElementById('event-description').textContent = ev.description || '';

        // Highlights
        if (ev.highlights && ev.highlights.length > 0) {
          document.getElementById('highlights-title').style.display = 'block';
          const container = document.getElementById('highlights-container');
          ev.highlights.forEach(h => {
            const item = document.createElement('div');
            item.className = 'highlight-item';
            item.innerHTML = `<div class="highlight-check">&#10003;</div><div class="highlight-text">${escapeHtml(h)}</div>`;
            container.appendChild(item);
          });
        }

        // Gallery (images beyond the first one)
        if (ev.images && ev.images.length > 1) {
          const gallery = document.getElementById('gallery');
          ev.images.slice(1).forEach(src => {
            const img = document.createElement('img');
            img.src = src;
            img.alt = 'Event photo';
            img.loading = 'lazy';
            gallery.appendChild(img);
          });
        }

        // RSVP
        if (ev.rsvp_url) {
          document.getElementById('rsvp-section').style.display = 'block';
          document.getElementById('rsvp-btn').href = ev.rsvp_url;
        }

        // Contact
        const contactParts = [];
        if (ev.contact && ev.contact.email) contactParts.push(`<a href="mailto:${escapeHtml(ev.contact.email)}">${escapeHtml(ev.contact.email)}</a>`);
        if (ev.contact && ev.contact.phone) contactParts.push(`<a href="tel:${escapeHtml(ev.contact.phone)}">${escapeHtml(ev.contact.phone)}</a>`);
        if (contactParts.length > 0) {
          const sec = document.getElementById('contact-section');
          sec.style.display = 'block';
          sec.innerHTML = 'Questions? Reach out: ' + contactParts.join(' &middot; ');
        }

        // Show page
        document.getElementById('loading').style.display = 'none';
        document.getElementById('page').classList.add('loaded');
      } catch (err) {
        document.getElementById('loading').textContent = 'Event details coming soon!';
        console.error('Failed to load event data:', err);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    loadEvent();
  </script>
</body>
</html>
